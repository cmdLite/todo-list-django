{% extends "base.html" %} {% block content %}

<div class="todo-container" style="width: 500px">
  <div class="todo-search" style="height: auto; padding: 20px 10px">
    <form action="" method="POST" style="flex-wrap: wrap">
      {% csrf_token %}
      <div style="width: 100%; display: flex; justify-content: space-between">
        {{ form.title }}
        <button type="submit">Add</button>
      </div>
    </form>

    <!-- AI Suggestion feature -->
    <div
      style="
        width: 100%;
        margin-top: 15px;
        border-top: 1px solid #eee;
        padding-top: 15px;
      "
    >
      <p style="font-size: 14px; margin-bottom: 5px; color: #555">
        <i>Ask AI to suggest tasks:</i>
      </p>
      <div style="display: flex; gap: 10px">
        <input
          type="text"
          id="ai-prompt"
          placeholder="e.g. Plan a birthday party"
          class="myinput"
          style="height: 40px; font-size: 14px; font-style: italic"
        />
        <button
          type="button"
          id="ai-btn"
          style="
            height: 40px;
            width: 80px;
            background-color: #a459f4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
          "
        >
          Suggest
        </button>
      </div>
      <div
        id="ai-results"
        style="margin-top: 10px; font-size: 14px; color: #333; display: none"
      >
        <p><b>Suggestions:</b></p>
        <ul id="ai-list" style="list-style-type: disc; padding-left: 20px"></ul>
      </div>
    </div>
  </div>

  <div class="todo-list">
    {% for task in tasks %}
    <div class="todo-list-item">
      <div class="task">
        <form
          action="{% url 'task-toggle' task.id %}"
          method="POST"
          class="toggle-form"
          style="display: inline"
        >
          {% csrf_token %}
          <input type="hidden" name="completed" value="{{ task.completed }}" />
          <input
            type="checkbox"
            name="completed"
            onchange="this.form.submit()"
            {%
            if
            task.completed
            %}checked{%
            endif
            %}
          />
          <span class="task {% if task.completed %}completed{% endif %}">
            {{ task.title }}
          </span>
        </form>
      </div>

      <div class="btn-container">
        <div class="edit">
          <a href="{% url 'task-update' task.id %}">
            <i class="fa-solid fa-pen-to-square"></i>
          </a>
        </div>
        <div class="del">
          <a href="{% url 'task-delete' task.id %}">
            <i class="fa-solid fa-trash-can"></i>
          </a>
        </div>
      </div>
    </div>
    {% endfor %} {% if not tasks %}
    <p style="text-align: center; color: gray; margin-top: 20px">
      No tasks available.
    </p>
    {% endif %}
  </div>
</div>

<script>
  document.getElementById("ai-btn").addEventListener("click", async () => {
    const prompt = document.getElementById("ai-prompt").value;
    if (!prompt) return;

    const btn = document.getElementById("ai-btn");
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
    btn.disabled = true;

    try {
      // Must include CSRF token for Django POST requests via ajax
      const csrf = document.querySelector("[name=csrfmiddlewaretoken]").value;
      const res = await fetch("{% url 'ai-suggest' %}", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrf,
        },
        body: JSON.stringify({ prompt }),
      });

      const data = await res.json();
      if (data.error) {
        alert(data.error);
      } else {
        const list = document.getElementById("ai-list");
        list.innerHTML = "";
        data.suggestions.forEach((item) => {
          const li = document.createElement("li");
          li.style.cursor = "pointer";
          li.style.color = "#a459f4";
          li.style.textDecoration = "underline";
          li.style.marginBottom = "5px";
          li.textContent = item;
          // Clicking a suggestion fills it into the main form
          li.onclick = () => {
            document.querySelector('input[name="title"]').value = item;
          };
          list.appendChild(li);
        });
        document.getElementById("ai-results").style.display = "block";
      }
    } catch (e) {
      alert("Error contacting AI server.");
    }

    btn.innerHTML = "Suggest";
    btn.disabled = false;
  });
</script>

{% endblock content %}
