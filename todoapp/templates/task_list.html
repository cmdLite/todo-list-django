{% extends "base.html" %} 

{% block content %}
<h1>Todo AI</h1>

<div class="todo-container">
  <!-- Input Section -->
  <div class="todo-search">
    <form action="" method="POST">
      {% csrf_token %}
      {{ form.title }}
      <button type="submit">
        <i class="fa-solid fa-plus me-2"></i> Add
      </button>
    </form>

    <!-- AI Suggestion Section -->
    <div class="ai-section">
      <p>
        <i class="fa-solid fa-wand-magic-sparkles me-2"></i> Ask AI to suggest tasks
      </p>
      <div class="ai-input-group">
        <input
          type="text"
          id="ai-prompt"
          placeholder="e.g. Plan a weekend trip..."
          class="myinput"
        />
        <button type="button" id="ai-btn">
          Suggest
        </button>
      </div>
      
      <div id="ai-results" style="display: none">
        <ul id="ai-list"></ul>
      </div>
    </div>
  </div>

  <!-- Task List Section -->
  <div class="todo-list">
    {% for task in tasks %}
    <div class="todo-list-item">
      <div class="task-content">
        <form
          action="{% url 'task-toggle' task.id %}"
          method="POST"
          class="toggle-form"
        >
          {% csrf_token %}
          <input type="hidden" name="completed" value="{{ task.completed }}" />
          <input
            type="checkbox"
            name="completed"
            onchange="this.form.submit()"
            {% if task.completed %}checked{% endif %}
          />
        </form>
        <span class="task-title {% if task.completed %}completed{% endif %}">
          {{ task.title }}
        </span>
      </div>

      <div class="btn-container">
        <a href="{% url 'task-update' task.id %}" class="edit-btn" title="Edit Task">
          <i class="fa-solid fa-pen"></i>
        </a>
        <a href="{% url 'task-delete' task.id %}" class="del-btn" title="Delete Task">
          <i class="fa-solid fa-trash"></i>
        </a>
      </div>
    </div>
    {% empty %}
    <div class="empty-state">
      <i class="fa-solid fa-clipboard-check fa-3x mb-3" style="opacity: 0.2"></i>
      <p>No tasks available. Start by adding one!</p>
    </div>
    {% endfor %}
  </div>
</div>

<script>
  document.getElementById("ai-btn").addEventListener("click", async () => {
    const promptInput = document.getElementById("ai-prompt");
    const prompt = promptInput.value.trim();
    if (!prompt) return;

    const btn = document.getElementById("ai-btn");
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
    btn.disabled = true;

    try {
      const csrf = document.querySelector("[name=csrfmiddlewaretoken]").value;
      const res = await fetch("{% url 'ai-suggest' %}", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": csrf,
        },
        body: JSON.stringify({ prompt }),
      });

      const data = await res.json();
      if (data.error) {
        alert(data.error);
      } else {
        const list = document.getElementById("ai-list");
        list.innerHTML = "";
        data.suggestions.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          li.onclick = () => {
            const mainInput = document.querySelector('input[name="title"]');
            mainInput.value = item;
            mainInput.focus();
            // Scroll to main input if needed
            mainInput.scrollIntoView({ behavior: 'smooth', block: 'center' });
          };
          list.appendChild(li);
        });
        document.getElementById("ai-results").style.display = "block";
      }
    } catch (e) {
      alert("Error contacting AI server.");
    } finally {
      btn.innerHTML = originalText;
      btn.disabled = false;
    }
  });

  // Simple animation for list items when added
  document.querySelectorAll('.todo-list-item').forEach((item, index) => {
    item.style.animation = `fadeIn 0.4s ease-out forwards ${index * 0.05}s`;
    item.style.opacity = 0;
  });
</script>

{% endblock content %}
