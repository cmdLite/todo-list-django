{% extends "base.html" %} 

{% block content %}
<div class="form-container">
  <h2 class="form-title">Delete Task</h2>
  
  <p class="text-secondary mb-3">Are you sure you want to delete this task?</p>
  <h3 class="mb-4" style="color: var(--text-primary)">"{{ task.title }}"</h3>
  
  <div class="btn-group">
    <form action="" method="POST" style="margin: 0; flex: 1;">
      {% csrf_token %}
      <button type="submit" class="btn-danger" style="width: 100%">
        <i class="fa-solid fa-trash-can me-2"></i> Delete Forever
      </button>
    </form>
    <a href="{% url 'task-list' %}" class="btn-secondary" style="text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 12px 24px; border-radius: 12px; font-weight: 600; flex: 1;">
      Cancel
    </a>
  </div>
</div>
{% endblock content %}
