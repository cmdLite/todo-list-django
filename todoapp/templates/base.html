<!DOCTYPE html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo AI - Stay Productive</title>
    
    <!-- Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="A powerful and beautiful AI-enhanced todo application to boost your productivity.">
    <meta name="theme-color" content="#0f172a">
  </head>
  <body>
    <div class="main-container">
      {% block content %}
      <!-- Content injected by sub-templates -->
      {% endblock content %}
    </div>
    
    <!-- Subtle interactive elements or scripts can go here -->
  </body>
</html>
